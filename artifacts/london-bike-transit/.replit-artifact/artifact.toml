kind = "web"
previewPath = "/"
title = "London Bike Transit Planner"
version = "1.0.0"
id = "artifacts/london-bike-transit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21409

[services.development]
run = "pnpm --filter @workspace/london-bike-transit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/london-bike-transit", "run", "build" ]
publicDir = "artifacts/london-bike-transit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21409"
BASE_PATH = "/"
